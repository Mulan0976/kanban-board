name = "kanban-board"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "kanban-board-db"
database_id = "92dc8f71-ca0f-4dee-b46a-ea397d6a73ed"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "kanban-board-images"

[[durable_objects.bindings]]
name = "BOARD_ROOM"
class_name = "BoardRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BoardRoom"]

# JWT_SECRET is configured as a Cloudflare Workers secret.
# Set it with: npx wrangler secret put JWT_SECRET
